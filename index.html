<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowSync — The SaaS Platform That Moves With You</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --surface: #0e1420;
    --surface2: #151c2c;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --accent-glow: rgba(108,99,255,0.35);
    --text: #f0f2f8;
    --muted: #8892a4;
    --muted2: #4a5568;
    --radius: 14px;
    --radius-sm: 8px;
    --max: 1140px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── CANVAS PARTICLES ── */
  #particles-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 24px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    background: rgba(8,11,18,0.75);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }

  .nav-inner {
    max-width: var(--max);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  .nav-cta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-ghost {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s;
  }
  .btn-ghost:hover { color: var(--text); }

  .btn-primary {
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 0 20px var(--accent-glow);
    transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .btn-primary:hover {
    opacity: 0.9;
    box-shadow: 0 0 32px var(--accent-glow);
    transform: translateY(-1px);
  }

  .hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 4px;
  }

  /* ── MOBILE NAV ── */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 68px; left: 0; right: 0;
    background: rgba(8,11,18,0.97);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 24px;
    z-index: 99;
    flex-direction: column;
    gap: 20px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: var(--muted);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .mobile-menu a:hover { color: var(--text); }
  .mobile-menu .btn-primary { text-align: center; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
  }

  .hero-inner { max-width: 780px; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(108,99,255,0.12);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .hero-badge .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.6rem, 6vw, 4.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    color: var(--text);
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 56px;
  }

  .btn-primary-lg {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 50px;
    padding: 15px 32px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 0 32px var(--accent-glow);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-primary-lg:hover {
    opacity: 0.9;
    transform: translateY(-2px);
    box-shadow: 0 0 48px var(--accent-glow);
  }

  .btn-outline-lg {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 15px 32px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-outline-lg:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
  }

  .hero-social-proof {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .avatars {
    display: flex;
  }
  .avatars img {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    margin-left: -10px;
    object-fit: cover;
  }
  .avatars img:first-child { margin-left: 0; }

  .proof-text {
    font-size: 0.875rem;
    color: var(--muted);
  }

  .proof-text strong { color: var(--text); }

  .stars { color: #f59e0b; letter-spacing: 1px; }

  /* ── DASHBOARD PREVIEW ── */
  .dashboard-preview {
    position: relative;
    z-index: 1;
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 24px 96px;
  }

  .dashboard-wrap {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 80px rgba(108,99,255,0.12);
  }

  .dashboard-bar {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .browser-bar {
    flex: 1;
    background: var(--surface2);
    border-radius: 6px;
    height: 26px;
    margin: 0 12px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
  }

  .browser-url {
    font-size: 0.72rem;
    color: var(--muted2);
    font-family: 'Inter', monospace;
  }

  .dashboard-img {
    width: 100%;
    display: block;
    background: var(--surface2);
  }

  /* Fake dashboard UI inside the browser */
  .fake-dashboard {
    background: var(--surface2);
    padding: 24px;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
    min-height: 380px;
  }

  .dash-sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dash-sidebar-item {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .dash-sidebar-item.active {
    background: rgba(108,99,255,0.15);
    color: var(--accent2);
  }
  .dash-sidebar-item:hover:not(.active) {
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  .dash-main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  .dash-heading {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  .dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .dash-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }

  .dash-stat-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  .dash-stat-value { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--text); }
  .dash-stat-delta { font-size: 0.68rem; color: #4ade80; margin-top: 2px; }

  .dash-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    height: 100px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }

  .bar-col {
    flex: 1;
    background: rgba(108,99,255,0.25);
    border-radius: 3px 3px 0 0;
    transition: background 0.2s;
  }
  .bar-col.active { background: var(--accent); }
  .bar-col:hover { background: var(--accent2); }

  /* ── LOGOS ── */
  .logos-section {
    position: relative;
    z-index: 1;
    padding: 0 24px 96px;
    text-align: center;
  }

  .logos-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .logos-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
  }

  .logo-item {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--muted2);
    letter-spacing: -0.01em;
    transition: color 0.2s;
  }
  .logo-item:hover { color: var(--muted); }

  /* ── FEATURES ── */
  .section {
    position: relative;
    z-index: 1;
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 24px 96px;
  }

  .section-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .section-sub {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 56px;
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .feature-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }

  .feature-card:hover {
    border-color: rgba(108,99,255,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(108,99,255,0.08);
  }

  .feature-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(108,99,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    color: var(--accent2);
  }

  .feature-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .feature-desc {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.65;
  }

  /* ── HOW IT WORKS ── */
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    position: relative;
  }

  .steps-grid::before {
    content: '';
    position: absolute;
    top: 36px; left: calc(16.66% + 14px); right: calc(16.66% + 14px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    z-index: 0;
  }

  .step-card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px;
  }

  .step-number {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--accent2);
    margin: 0 auto 20px;
    box-shadow: 0 0 20px rgba(108,99,255,0.15);
  }

  .step-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .step-desc {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.65;
  }

  /* ── TESTIMONIALS ── */
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .testimonial-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    transition: border-color 0.2s;
  }

  .testimonial-card:hover { border-color: rgba(108,99,255,0.3); }

  .testimonial-stars { color: #f59e0b; font-size: 0.85rem; margin-bottom: 14px; }

  .testimonial-text {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .testimonial-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
  }

  .author-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text);
  }

  .author-role {
    font-size: 0.78rem;
    color: var(--muted2);
  }

  /* ── PRICING ── */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  .pricing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .pricing-card.featured {
    border-color: var(--accent);
    box-shadow: 0 0 60px rgba(108,99,255,0.2);
    position: relative;
  }

  .pricing-card:hover { transform: translateY(-4px); }

  .pricing-badge {
    position: absolute;
    top: -13px; left: 50%; transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 50px;
  }

  .plan-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .plan-price {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .plan-price span {
    font-size: 1rem;
    font-weight: 500;
    color: var(--muted);
  }

  .plan-desc {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .plan-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 24px;
  }

  .plan-features { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

  .plan-features li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.875rem;
    color: var(--muted);
  }

  .plan-features li .check { color: #4ade80; flex-shrink: 0; }
  .plan-features li .cross { color: var(--muted2); flex-shrink: 0; }

  .btn-plan {
    width: 100%;
    padding: 13px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    border: none;
  }

  .btn-plan:hover { opacity: 0.85; transform: translateY(-1px); }

  .btn-plan-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .btn-plan-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border) !important;
    border: none;
  }

  /* ── FAQ ── */
  .faq-list { display: flex; flex-direction: column; gap: 12px; max-width: 720px; }

  .faq-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .faq-item:hover { border-color: rgba(108,99,255,0.3); }

  .faq-question {
    width: 100%;
    background: none;
    border: none;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    gap: 12px;
  }

  .faq-icon { color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
  .faq-item.open .faq-icon { transform: rotate(45deg); }

  .faq-answer {
    display: none;
    padding: 0 20px 18px;
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .faq-item.open .faq-answer { display: block; }

  /* ── CTA ── */
  .cta-section {
    position: relative;
    z-index: 1;
    padding: 0 24px 96px;
  }

  .cta-inner {
    max-width: var(--max);
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 72px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-glow {
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-inner h2 {
    font-family: 'Syne', sans-serif;
